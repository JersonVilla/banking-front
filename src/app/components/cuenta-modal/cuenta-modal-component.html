@if (isOpen) {

<div class="modal-backdrop fade show"></div>

<div class="modal fade show d-block" (click)="cerrar()">
  <div class="modal-dialog modal-lg" (click)="$event.stopPropagation()">
    <div class="modal-content">

      <div class="modal-header bg-dark text-white">
        <h5 class="modal-title">
          {{ modoEdicion() ? 'Editar Cuenta' : 'Nueva Cuenta' }}
        </h5>
        <button class="btn-close btn-close-white" (click)="cerrar()"></button>
      </div>

      <div class="modal-body">
        <form [formGroup]="form">

          <div class="mb-3">
            <label>Número Cuenta</label>
            <input class="form-control" formControlName="numeroCuenta">
          </div>

          <div class="mb-3">
            <label>Cliente</label>
            <input class="form-control" formControlName="nombreCliente">
          </div>

          <div class="mb-3">
            <label>Tipo</label>
            <select class="form-select" formControlName="tipoCuenta">
              <option value="">Seleccione...</option>
              <option value="Ahorros">Ahorros</option>
              <option value="Corriente">Corriente</option>
            </select>
          </div>

          <div class="mb-3">
            <label>Saldo Inicial</label>
            <input type="number" class="form-control" formControlName="saldoInicial">
          </div>

          <div class="form-check">
            <input type="checkbox" class="form-check-input" formControlName="estado">
            <label class="form-check-label">Activa</label>
          </div>

        </form>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" (click)="cerrar()">Cancelar</button>
        <button class="btn btn-primary" (click)="guardar()" [disabled]="form.invalid">
          Guardar
        </button>
      </div>

    </div>
  </div>
</div>

}
