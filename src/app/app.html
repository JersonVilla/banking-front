<div class="container-fluid p-0 d-flex flex-column min-vh-100">
  <!-- HEADER -->
  <header class="bg-dark text-white py-3 px-4 shadow">
    <h4 class="m-0">Bancos</h4>
  </header>

  <div class="flex-grow-1">
    <div class="row g-0 h-100">
      <!-- SIDEBAR (25%) -->
      <div class="col-3 col-md-3 bg-light border-end">
        <app-sidebar-component></app-sidebar-component>
      </div>

      <!-- CONTENIDO (75%) -->
      <div class="col-9 col-md-9 d-flex flex-column">
        <!-- NAVBAR SOLO EN CONTENT -->
        <nav class="navbar bg-body-tertiary border-bottom px-4">
          <div class="container-fluid d-flex justify-content-between px-0">
            <!-- BUSCADOR -->
            <form class="d-flex" (submit)="buscar(); $event.preventDefault()">
              <input 
                class="form-control me-2" 
                type="search" 
                placeholder="Buscar..." 
                [(ngModel)]="terminoBusqueda"
                (input)="onBusquedaChange()"
                name="busqueda" />
              <button class="btn btn-outline-success" type="submit">Buscar</button>
            </form>

            <!-- BOTÓN NUEVO -->
            <button class="btn btn-warning" (click)="abrirModal()">+ Nuevo</button>
          </div>
        </nav>

        <!-- CONTENIDO DINÁMICO -->
        <div class="p-4 flex-grow-1">
          <router-outlet></router-outlet>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal de Cliente -->
<app-cliente-modal 
  [isOpen]="modalAbierto()"
  [cliente]="clienteSeleccionado"
  (onGuardar)="guardarCliente($event)"
  (onCancelar)="cerrarModal()">
</app-cliente-modal>
